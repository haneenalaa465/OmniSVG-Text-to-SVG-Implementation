<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSVG - Text to SVG Generation</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --background-color: #f8f9fa;
            --dark-color: #343a40;
            --light-color: #ffffff;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--dark-color);
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        
        p {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        .card {
            background-color: var(--light-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .card-header {
            background-color: var(--primary-color);
            color: var(--light-color);
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .parameters {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .parameter-group {
            flex: 1;
            min-width: 200px;
        }
        
        input[type="number"],
        input[type="range"] {
            width: 100%;
        }
        
        .range-value {
            text-align: center;
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--secondary-color);
        }
        
        button {
            background-color: var(--primary-color);
            color: var(--light-color);
            border: none;
            border-radius: 4px;
            padding: 12px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #0069d9;
        }
        
        .loading {
            text-align: center;
            margin: 20px 0;
            display: none;
        }
        
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result {
            margin-top: 30px;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .generation-time {
            font-size: 0.9rem;
            color: var(--secondary-color);
        }
        
        .svg-result {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            background-color: #fff;
        }
        
        .svg-result svg {
            max-width: 100%;
            max-height: 400px;
        }
        
        .download-btn {
            background-color: var(--success-color);
            margin-top: 15px;
        }
        
        .download-btn:hover {
            background-color: #218838;
        }
        
        .error {
            color: #dc3545;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: var(--secondary-color);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>OmniSVG</h1>
            <p>Generate Scalable Vector Graphics from text descriptions</p>
        </header>
        
        <div class="card">
            <div class="card-header">Generate SVG</div>
            <div class="card-body">
                <form id="svg-form">
                    <div class="form-group">
                        <label for="prompt">Text Description:</label>
                        <textarea id="prompt" name="prompt" required placeholder="Describe the SVG you want to generate..."></textarea>
                    </div>
                    
                    <div class="parameters">
                        <div class="parameter-group">
                            <div class="form-group">
                                <label for="temperature">Temperature:</label>
                                <input type="range" id="temperature" name="temperature" min="0.1" max="1.5" step="0.1" value="0.7">
                                <div class="range-value">0.7</div>
                            </div>
                        </div>
                        
                        <div class="parameter-group">
                            <div class="form-group">
                                <label for="top_k">Top K:</label>
                                <input type="range" id="top_k" name="top_k" min="1" max="100" step="1" value="50">
                                <div class="range-value">50</div>
                            </div>
                        </div>
                        
                        <div class="parameter-group">
                            <div class="form-group">
                                <label for="top_p">Top P:</label>
                                <input type="range" id="top_p" name="top_p" min="0.1" max="1.0" step="0.05" value="0.95">
                                <div class="range-value">0.95</div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit">Generate SVG</button>
                </form>
                
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Generating SVG... This may take a moment.</p>
                </div>
                
                <div id="error" class="error" style="display: none;"></div>
            </div>
        </div>
        
        <div id="result" class="result" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <div class="result-header">
                        <span>Generated SVG</span>
                        <span id="generation-time" class="generation-time"></span>
                    </div>
                </div>
                <div class="card-body">
                    <div id="svg-result" class="svg-result"></div>
                    <button id="download" class="download-btn">Download SVG</button>
                </div>
            </div>
        </div>
        
        <footer>
            <p>Powered by OmniSVG - A Text-to-SVG Generation Model</p>
        </footer>
    </div>
    
    <script>
        // Update range value displays
        document.querySelectorAll('input[type="range"]').forEach(input => {
            const valueDisplay = input.nextElementSibling;
            input.addEventListener('input', () => {
                valueDisplay.textContent = input.value;
            });
        });
        
        // Handle form submission
        const form = document.getElementById('svg-form');
        const loading = document.querySelector('.loading');
        const result = document.getElementById('result');
        const svgResult = document.getElementById('svg-result');
        const generationTime = document.getElementById('generation-time');
        const errorElement = document.getElementById('error');
        const downloadBtn = document.getElementById('download');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Show loading
            loading.style.display = 'block';
            result.style.display = 'none';
            errorElement.style.display = 'none';
            
            // Get form data
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            try {
                // Make API request
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                // Hide loading
                loading.style.display = 'none';
                
                if (response.ok) {
                    const responseData = await response.json();
                    
                    // Display SVG
                    svgResult.innerHTML = responseData.svg[0];
                    generationTime.textContent = `Generated in ${responseData.generation_time.toFixed(2)}s`;
                    result.style.display = 'block';
                    
                    // Setup download button
                    downloadBtn.onclick = () => {
                        downloadSVG(responseData.svg[0], `omnisvg_${Date.now()}.svg`);
                    };
                } else {
                    const errorData = await response.json();
                    errorElement.textContent = errorData.error || 'An error occurred during SVG generation.';
                    errorElement.style.display = 'block';
                }
            } catch (error) {
                loading.style.display = 'none';
                errorElement.textContent = 'An error occurred during SVG generation. Please try again.';
                errorElement.style.display = 'block';
                console.error('Error:', error);
            }
        });
        
        // Function to download SVG
        function downloadSVG(svgContent, filename) {
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
